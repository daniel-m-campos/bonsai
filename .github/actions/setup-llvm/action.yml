name: setup-llvm
description: clang-21 + libc++ + libomp from apt.llvm.org (matches Makefile LLVM_BIN)
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
          | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc >/dev/null
        echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-21 main" \
          | sudo tee /etc/apt/sources.list.d/llvm21.list >/dev/null
        sudo apt-get update -qq
        sudo apt-get install -y -qq clang-21 clang-tools-21 clang-tidy-21 \
          clang-format-21 libc++-21-dev libc++abi-21-dev libomp-21-dev \
          ninja-build ccache
