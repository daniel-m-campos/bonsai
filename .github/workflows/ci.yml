name: CI

on:
  pull_request:
    # Prose-only changes skip the build. Include-with-negation instead of
    # paths-ignore so NEW docs subdirectories are excluded automatically;
    # docs/use/** is re-included because the python job executes its code
    # snippets (README.md stays in via '**').
    paths:
      - "**"
      - "!docs/**"
      - "docs/use/**"
      - "!mkdocs.yml"
      - "!CHANGELOG.md"
      - "!.github/workflows/docs-site.yml"
  push:
    branches: [main]
    # Prose-only changes skip the build. Include-with-negation instead of
    # paths-ignore so NEW docs subdirectories are excluded automatically;
    # docs/use/** is re-included because the python job executes its code
    # snippets (README.md stays in via '**').
    paths:
      - "**"
      - "!docs/**"
      - "docs/use/**"
      - "!mkdocs.yml"
      - "!CHANGELOG.md"
      - "!.github/workflows/docs-site.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CTEST_OUTPUT_ON_FAILURE: 1
  # CMake honors this env var at first configure; the Makefile stays clean.
  CMAKE_CXX_COMPILER_LAUNCHER: ccache

jobs:
  # Classifies what changed so heavy jobs can skip when only snippet-tested
  # prose (docs/use/**, README.md) is touched; the workflow-level paths
  # filter already excludes pure prose entirely.
  changes:
    runs-on: ubuntu-24.04
    outputs:
      code: ${{ steps.filter.outputs.code }}
      snippets: ${{ steps.filter.outputs.snippets }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            snippets:
              - "docs/use/**"
              - "README.md"
            code:
              - "**"
              - "!docs/**"
              - "!README.md"
              - "!CHANGELOG.md"
              - "!mkdocs.yml"

  build-test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-llvm
      - uses: astral-sh/setup-uv@v5
      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: build-test
      - uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-build-${{ hashFiles('CMakeLists.txt') }}
      - uses: actions/cache@v4
        with:
          path: tests/data
          key: toy-data-${{ hashFiles('scripts/fetch_toy.py') }}
      - run: make build
      - run: make test

  sanitize:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-llvm
      - uses: astral-sh/setup-uv@v5
      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: sanitize
      - uses: actions/cache@v4
        with:
          path: build-asan/_deps
          key: deps-asan-${{ hashFiles('CMakeLists.txt') }}
      - uses: actions/cache@v4
        with:
          path: tests/data
          key: toy-data-${{ hashFiles('scripts/fetch_toy.py') }}
      # detect_leaks=0: libomp keeps its thread pool alive past exit and
      # LSan flags the runtime's own allocations, not bonsai's.
      - run: make test-asan
        env:
          ASAN_OPTIONS: detect_leaks=0:abort_on_error=1

  format:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-llvm
      - run: make format-check

  tidy:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-llvm
      - uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-build-${{ hashFiles('CMakeLists.txt') }}
      - run: make configure
      - run: make lint

  python:
    needs: changes
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.snippets == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      # 3.9 is the pyproject floor, 3.12 is uv's modern default; a tomllib
      # import once broke on 3.10 because only the floor-or-newer end of
      # this range was ever exercised.
      matrix:
        python: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-llvm
      - uses: astral-sh/setup-uv@v5
      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: python  # shared: only the bindings TU differs by Python version
      - uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-build-${{ hashFiles('CMakeLists.txt') }}
      - uses: actions/cache@v4
        with:
          path: tests/data
          key: toy-data-${{ hashFiles('scripts/fetch_toy.py', 'scripts/fetch_amazon.py') }}
      # lightgbm: test_bindings.py cross-checks feature importances against it.
      - run: uv venv --python ${{ matrix.python }} .venv && uv pip install --python .venv/bin/python nanobind numpy lightgbm scikit-learn
      # ruff first: a lint finding shouldn't cost a build to discover.
      - run: make lint-python
      # The results ledger is generated from benchmarks/results/; a stale
      # page or an unwired committed data file fails here (stdlib only).
      - run: python3 scripts/render_results.py --check
      # The parameters reference is rendered from docs/use/parameters.src.json
      # (extracted from the CLI by `make params-json`); a stale page or a knob
      # with no effect line fails here (stdlib only, no C++ build).
      - run: python3 scripts/render_params.py --check
      # The make-target map is generated from the Makefile's ## comments; a
      # stale page fails here (stdlib only).
      - run: python3 scripts/render_make_map.py --check
      # The GBT history timeline is generated from docs/learn/timeline.json; a
      # stale page, an invalid entry, or a broken bonsai_link fails here
      # (stdlib only).
      - run: python3 scripts/render_timeline.py --check
      # Mechanical STYLE.md checks (em-dash, library casing, banned phrases)
      # over the published, non-archive pages plus README.md (stdlib only).
      - run: python3 scripts/docs_lint.py
      # test_bindings.py checks module-vs-CLI parity, so it needs the binary too.
      - run: make build
      - run: make python-test
      # Every ```{.python .run} example in the published docs, executed against
      # the module built by python-test (build/python). Uses the venv python
      # so numpy and the ABI-matched extension resolve; GPU blocks are listed
      # and skipped without --gpu.
      - run: PYTHONPATH=build/python .venv/bin/python scripts/run_docs_examples.py

  # Compile-only: no GPU runners, but the kernel TU should not silently rot.
  cuda-compile:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-llvm
      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: cuda-compile
      - uses: actions/cache@v4
        with:
          path: build-cuda/_deps
          key: deps-cuda-${{ hashFiles('CMakeLists.txt') }}
      - uses: ./.github/actions/setup-cuda
        id: cuda
      - name: Configure and build (sm_80, tests off)
        run: |
          cmake -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=/usr/lib/llvm-21/bin/clang++ \
            -DBONSAI_CUDA=ON -DBONSAI_CUDA_ARCH=sm_80 -DBONSAI_TESTS=OFF \
            -DCUDAToolkit_ROOT=${{ steps.cuda.outputs.root }} \
            -G Ninja -S . -B build-cuda
          cmake --build build-cuda -j
