name: ci-image

# Builds the pinned validation-pod toolchain image (docker/ci.Dockerfile)
# and pushes it to GHCR. Runs only when the image definition changes, or on
# demand. The package must be public for RunPod pods to pull anonymously:
# github.com -> package bonsai-ci -> settings -> change visibility (one-time).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["docker/**", ".github/workflows/ci-image.yml"]

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ci.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/bonsai-ci:cuda12.4
            ghcr.io/${{ github.repository_owner }}/bonsai-ci:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
