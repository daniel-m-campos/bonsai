# Prebuilt wheels so users get `pip install` without LLVM/CMake.
# Native-runner builds (not manylinux containers): the official LLVM release
# binaries need a newer glibc than manylinux_2_28 ships, so we build on
# ubuntu-22.04 (glibc 2.35) and tag manylinux_2_35 — Ubuntu 22.04+/Debian 12+.
#
# The linux x86_64 wheel is CUDA-enabled (issue #99): 7-arch SASS plus an
# sm_90 PTX forward-JIT floor, cudart linked statically so GPU-less hosts
# import cleanly (cuda_available() == False; leg-0 measured 2.33MB total).
# It is withheld from the release auto-attach pending the GPU pod gate.
# arm64 and macOS wheels stay CPU-only.
#
# auditwheel/delocate vendor libc++ (and libunwind) into the wheel. libomp is
# static on macOS but vendored DYNAMIC on Linux: apt.llvm.org ships no
# libomp.a, so BONSAI_OPENMP_STATIC falls back and auditwheel's name-mangled
# copy provides the private runtime instead (issue #134). Wheels attach to
# the GitHub Release on publish; PyPI is a follow-up (trusted publishing).
name: wheels

on:
  workflow_dispatch:
    inputs:
      tag:
        description: >-
          Existing release tag to (re-)upload built assets to, e.g. after a
          flaked publish run. Leave empty for a plain build-only dispatch.
        type: string
        default: ""
  pull_request:
    paths:
      - ".github/workflows/wheels.yml"
      - ".github/actions/setup-llvm/**"
      - ".github/actions/setup-cuda/**"
      - "pyproject.toml"
  release:
    types: [published]

concurrency:
  group: wheels-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-22.04-arm, macos-14]
        # PRs build one python leg per OS (the ci python job already covers
        # the 3.9 floor); releases and dispatches build the full fan.
        python: ${{ github.event_name == 'pull_request' && fromJSON('["3.12"]') || fromJSON('["3.9", "3.10", "3.11", "3.12", "3.13"]') }}
        # The linux x86_64 leg carries the CUDA backend (issue #99).
        include:
          - os: ubuntu-22.04
            cuda: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: ./.github/actions/setup-llvm
        with:
          packages: >-
            clang-21 libc++-21-dev libc++abi-21-dev libomp-21-dev ninja-build
            patchelf

      - uses: ./.github/actions/setup-cuda
        if: matrix.cuda
        id: cuda

      - name: Build wheel
        env:
          CMAKE_BUILD_PARALLEL_LEVEL: "4"
        run: |
          EXTRA=()
          if [ "${{ runner.os }}" = "Linux" ]; then
            export CC=/usr/lib/llvm-21/bin/clang CXX=/usr/lib/llvm-21/bin/clang++
          else
            export CC="$(brew --prefix llvm@21)/bin/clang"
            export CXX="$(brew --prefix llvm@21)/bin/clang++"
            # llvm@21 bottle's libc++ mislabels float from_chars availability
            export CXXFLAGS="-D_LIBCPP_DISABLE_AVAILABILITY"
            export MACOSX_DEPLOYMENT_TARGET="14.0"
          fi
          if [ "${{ matrix.cuda }}" = "true" ]; then
            # Fat SASS for every real arch, one PTX floor for forward-JIT
            # (sm_100+ JITs from compute_90), static cudart so the extension
            # has no CUDA DT_NEEDED. Sizes/costs measured on the leg-0 probe:
            # https://github.com/daniel-m-campos/bonsai/issues/99
            EXTRA=(-C cmake.define.BONSAI_CUDA=ON
                   -C "cmake.define.BONSAI_CUDA_ARCH=sm_70;sm_75;sm_80;sm_86;sm_89;sm_90;sm_120"
                   -C cmake.define.BONSAI_CUDA_PTX_ARCH=sm_90
                   -C cmake.define.BONSAI_CUDA_STATIC_RUNTIME=ON
                   -C cmake.define.CUDAToolkit_ROOT=${{ steps.cuda.outputs.root }})
          fi
          python -m pip wheel . -w dist --no-deps "${EXTRA[@]}"

      - name: Repair wheel (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m pip install auditwheel
          arch="$(uname -m)"
          python -m auditwheel repair --plat "manylinux_2_35_${arch}" \
            -w wheelhouse dist/*.whl

      - name: Repair wheel (macOS)
        if: runner.os == 'macOS'
        run: |
          python -m pip install delocate
          delocate-wheel -w wheelhouse -v dist/*.whl

      - name: Smoke test in a clean venv
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip -q install wheelhouse/*.whl
          /tmp/smoke/bin/python scripts/wheel_smoke.py
          if [ "${{ matrix.cuda }}" = "true" ]; then
            /tmp/smoke/bin/python scripts/wheel_smoke_gpu_absent.py
          fi

      # Byte-identity across the fold-in: every leg hashes the same fixed
      # model from inside its smoke venv and the hash-compare job asserts
      # equality — the cross-arch determinism contract (decisions 59/60),
      # proven here on the shipped artifacts with CUDA folded into one leg.
      - name: Model hash from the installed wheel
        if: matrix.python == '3.12'
        run: /tmp/smoke/bin/python scripts/model_hash.py | tee model-hash.txt

      - uses: actions/upload-artifact@v4
        if: matrix.python == '3.12'
        with:
          name: model-hash-${{ matrix.os }}
          path: model-hash.txt

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.cuda && 'cuda' || matrix.os }}-py${{ matrix.python }}
          path: wheelhouse/*.whl

  hash-compare:
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: model-hash-*
          path: hashes
      - run: |
          grep -H . hashes/*/model-hash.txt
          n=$(sha256sum hashes/*/model-hash.txt | awk '{print $1}' | sort -u | wc -l)
          if [ "$n" != "1" ]; then
            echo "::error::model hash split across wheel legs — the CUDA fold-in or a platform touched the host plane"
            exit 1
          fi

  sdist:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install build
          python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # The sdist is a separate build path from the wheel jobs (setup.py-style
  # source build via scikit-build-core) and had never actually been
  # pip-installed anywhere; this compiles it from source the way an end user
  # without a prebuilt wheel for their platform would.
  sdist-install-test:
    needs: sdist
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: ./.github/actions/setup-llvm
        with:
          packages: >-
            clang-21 libc++-21-dev libc++abi-21-dev libomp-21-dev ninja-build

      - name: Install sdist into a clean venv
        env:
          CMAKE_BUILD_PARALLEL_LEVEL: "4"
        run: |
          export CC=/usr/lib/llvm-21/bin/clang CXX=/usr/lib/llvm-21/bin/clang++
          python -m venv /tmp/sdist-install
          /tmp/sdist-install/bin/pip -q install numpy
          /tmp/sdist-install/bin/pip -v install dist/*.tar.gz

      - name: Smoke test
        run: /tmp/sdist-install/bin/python scripts/wheel_smoke.py

  publish:
    # Attach everything to the GitHub Release that triggered the run, or
    # (workflow_dispatch with a tag) re-upload to an existing release —
    # e.g. recovering from a flaked publish run without cutting a new tag.
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
    needs: [build, sdist, sdist-install-test, hash-compare]
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # The linux x86_64 wheel is the CUDA-enabled one; it attaches only
      # after passing on a real GPU (the pod gate), never straight from a
      # GPU-less build. arm64/macOS wheels and the sdist attach here.
      - name: Withhold the CUDA wheel pending the GPU gate
        run: |
          rm -f dist/model-hash.txt
          ls dist/
          rm -f dist/*manylinux*_x86_64*.whl
          echo "after withholding the CUDA (linux x86_64) wheel:"
          ls dist/

      - name: Resolve target tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      # This repo once shipped a release with pyproject.toml stale at 0.6.0
      # after a v1.0.0 tag; the sdist filename is the built source of truth
      # for "what version did we actually package", so check it against the
      # tag before anything gets uploaded.
      - name: Verify tag matches packaged version
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          version="${tag#v}"
          sdist_path="$(ls dist/bonsai_gbt-*.tar.gz)"
          sdist_name="$(basename "$sdist_path")"
          sdist_version="${sdist_name#bonsai_gbt-}"
          sdist_version="${sdist_version%.tar.gz}"
          if [ "$sdist_version" != "$version" ]; then
            echo "::error::tag '$tag' (version '$version') does not match" \
              "packaged sdist version '$sdist_version' ($sdist_name)"
            exit 1
          fi
          echo "tag $tag matches packaged version $sdist_version"

      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" dist/* \
            --repo "${{ github.repository }}" --clobber
