# Sparse-input benchmark: a9a (Adult preprocessed to 123 binary features,
# LIBSVM format), 32,561 train / 16,281 test rows, binary labels.
# Fetch with `uv run scripts/fetch_a9a.py`. bonsai materializes the sparse
# input dense; the reference libraries may consume it sparsely.

[data]
train = "tests/data/a9a_train.libsvm"
test  = "tests/data/a9a_test.libsvm"
format = "libsvm"
libsvm_n_features = 123

[bin_mapper]
max_bin = 255
n_samples = 200000
seed = 0

[tree]
max_depth = 6
min_data_in_leaf = 20
min_child_hess = 0.001
lambda_l2 = 1.0

[booster]
n_iters = 200
learning_rate = 0.1
random_seed = 42

[dispatch]
objective_name = "logloss"
grower_name = "leafwise"
sampler_name = "all_rows"
