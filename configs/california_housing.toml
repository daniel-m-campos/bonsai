# MVP regression run on California Housing.
# Hyperparameters matched in scripts/compare.py for the reference libraries.

[data]
train = "tests/data/california_housing_train.csv"
test  = "tests/data/california_housing_test.csv"
label_column = 0

[bin_mapper]
max_bin = 255
n_samples = 200000
seed = 0
min_data_in_bin = 1

[tree]
max_depth = 6
min_data_in_leaf = 20
min_child_hess = 0.001
min_gain_to_split = 0.0
lambda_l2 = 1.0

[booster]
n_iters = 200
learning_rate = 0.05
random_seed = 42

[dispatch]
objective_name = "mse"
grower_name = "depthwise"
sampler_name = "all_rows"
