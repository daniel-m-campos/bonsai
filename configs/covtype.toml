# Multiclass (7-way) classification on UCI Covertype: 500,012 train rows /
# 81,000 test rows, 54 numeric features, label = forest cover type 0..6.
# Fetch with `uv run scripts/fetch_covtype.py`.

[data]
train = "tests/data/covtype_train.csv"
test  = "tests/data/covtype_test.csv"
label_column = 0

[bin_mapper]
max_bin = 255
n_samples = 200000
seed = 0
min_data_in_bin = 1

[tree]
max_depth = 8
min_data_in_leaf = 100
min_child_hess = 0.001
lambda_l2 = 1.0

[booster]
n_iters = 100
learning_rate = 0.1
random_seed = 42

[objective]
n_classes = 7

[dispatch]
objective_name = "softmax"
grower_name = "leafwise"
sampler_name = "all_rows"

[metrics]
fit = ["mc_accuracy"]
eval = ["mc_accuracy"]
