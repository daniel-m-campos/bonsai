# Regression run on the UCI Year Prediction MSD dataset.
# 463,715 train rows / 51,630 test rows, 90 audio timbre features per row,
# label = release year (1922-2011). Fetch with `uv run scripts/fetch_year_msd.py`.

[data]
train = "tests/data/year_prediction_msd_train.csv"
test  = "tests/data/year_prediction_msd_test.csv"
label_column = 0

[bin_mapper]
max_bin = 255
n_samples = 200000
seed = 0
min_data_in_bin = 1

[tree]
max_depth = 8
min_data_in_leaf = 100
min_child_hess = 0.001
min_gain_to_split = 0.0
lambda_l2 = 1.0

[booster]
n_iters = 200
learning_rate = 0.05
random_seed = 42

[dispatch]
objective_name = "mse"
grower_name = "depthwise"
sampler_name = "all_rows"
