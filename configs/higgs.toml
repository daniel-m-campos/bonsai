# Binary classification on a HIGGS subset (UCI): 500,000 train rows /
# 50,000 test rows, 28 kinematic features, label = signal vs background.
# Fetch with `uv run scripts/fetch_higgs.py`.

[data]
train = "tests/data/higgs_train.csv"
test  = "tests/data/higgs_test.csv"
label_column = 0

[bin_mapper]
max_bin = 255
n_samples = 200000
seed = 0
min_data_in_bin = 1

[tree]
max_depth = 8
min_data_in_leaf = 100
min_child_hess = 0.001
min_gain_to_split = 0.0
lambda_l2 = 1.0

[booster]
n_iters = 200
learning_rate = 0.1
random_seed = 42

[dispatch]
objective_name = "logloss"
grower_name = "leafwise"
sampler_name = "all_rows"

[metrics]
fit = ["logloss", "auc"]
eval = ["logloss", "auc", "accuracy"]
